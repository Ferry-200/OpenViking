{
  "server": {
    "host": "0.0.0.0",
    "port": 1933,
    "root_api_key": "$OPENVIKING_ROOT_API_KEY",
    "cors_origins": ["*"]
  },
  "storage": {
    "workspace": "/app/data"
  },
  "embedding": {
    "dense": {
      "provider": "$EMBEDDING_PROVIDER",
      "model": "$EMBEDDING_MODEL",
      "api_key": "$EMBEDDING_API_KEY",
      "api_base": "$EMBEDDING_API_BASE",
      "dimension": 1024,
      "input": "text"
    }
  },
  "vlm": {
    "provider": "$VLM_PROVIDER",
    "model": "$VLM_MODEL",
    "api_key": "$VLM_API_KEY",
    "api_base": "$VLM_API_BASE",
    "temperature": 0.0,
    "max_retries": 2
  },
  "log": {
    "level": "INFO"
  }
}
